<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinitude</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      color: var(--text-color, #333);
    }

    /* ── Section divider ───────────────────────────────────────────── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted-color, #888);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 20px 0 8px;
      margin-bottom: 4px;
      border-top: 1px solid var(--border-color, #e0e0e0);
      margin-top: 8px;
    }

    /* ── Instance cards ────────────────────────────────────────────── */
    .instance-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 16px; }

    .instance-card {
      border: 1px solid var(--border-color, #e0e0e0);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-bg, #fff);
    }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--header-bg, #f5f5f5);
      border-bottom: 1px solid var(--border-color, #e0e0e0);
    }
    .card-title { font-size: 13px; font-weight: 600; }
    .card-url   { font-size: 11px; color: var(--muted-color, #888); margin-top: 2px; word-break: break-all; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500;
      padding: 3px 8px; border-radius: 20px;
      background: var(--badge-bg, #eee);
      color: var(--muted-color, #666);
      flex-shrink: 0; margin-left: 10px;
      transition: background 0.3s, color 0.3s;
    }
    .status-badge .dot {
      width: 7px; height: 7px; border-radius: 50%; background: currentColor;
    }
    .status-badge.online  { background: #e6f9ed; color: #1a7f3c; }
    .status-badge.offline { background: #fdecea; color: #c0392b; }
    .status-badge.checking { background: #fff8e1; color: #b07d00; }

    .card-actions {
      display: flex; gap: 8px; padding: 10px 14px;
      align-items: center; flex-wrap: wrap;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 6px; font-size: 12px;
      font-weight: 500; cursor: pointer; border: none;
      text-decoration: none; transition: opacity 0.15s; white-space: nowrap;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn:not(:disabled):hover { opacity: 0.82; }
    .btn-primary   { background: #007aff; color: #fff; }
    .btn-secondary { background: var(--btn-bg, #e8e8e8); color: var(--text-color, #333); }
    .btn-ghost     { background: var(--btn-bg, #e8e8e8); color: var(--text-color, #333); margin-left: auto; }

    .iframe-wrap { display: none; border-top: 1px solid var(--border-color, #e0e0e0); }
    .iframe-wrap.open { display: block; }
    .iframe-notice {
      font-size: 11px; color: var(--muted-color, #888);
      padding: 6px 14px 8px;
      background: var(--header-bg, #f5f5f5);
      border-bottom: 1px solid var(--border-color, #e0e0e0);
    }
    .iframe-wrap iframe { width: 100%; height: 520px; border: none; display: block; }

    /* ── States ────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 24px 16px;
      color: var(--muted-color, #888); font-size: 13px; line-height: 1.7;
    }
    .error-banner {
      background: #fdecea; border: 1px solid #f5c6c2; border-radius: 8px;
      padding: 12px 14px; font-size: 12px; color: #c0392b; line-height: 1.6;
      margin-bottom: 12px;
    }

    /* ── Dark mode ─────────────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      body { --text-color: #f0f0f0; --muted-color: #999; --border-color: #3a3a3a;
             --card-bg: #252525; --header-bg: #1e1e1e; --btn-bg: #353535; --badge-bg: #2a2a2a; }
      .error-banner { background: #3a1a1a; border-color: #883333; color: #ff8888; }
      .status-badge.online  { background: #1a3a25; color: #4cd97b; }
      .status-badge.offline { background: #3a1a1a; color: #ff6b6b; }
      .status-badge.checking { background: #2a2010; color: #ffc947; }
    }
  </style>
</head>
<body>

  <!-- The config form is injected here by homebridge.createForm() -->
  <div id="config-form"></div>

  <!-- Infinitude quick-access panel rendered below the form -->
  <div id="instances-panel"></div>

  <script>
    // ── Helpers ──────────────────────────────────────────────────────
    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
      return String(s).replace(/'/g,"&#39;").replace(/"/g,'&quot;');
    }

    // ── Main ─────────────────────────────────────────────────────────
    async function init() {
      if (typeof homebridge === 'undefined') {
        document.getElementById('instances-panel').innerHTML =
          '<div class="error-banner">⚠️ Homebridge UI API unavailable. Try reopening plugin settings.</div>';
        return;
      }

      // 1. Render the standard config form so all settings remain editable
      try {
        await homebridge.createForm();
      } catch (e) {
        console.warn('createForm failed:', e);
      }

      // 2. Load config to build the Infinitude instance panel
      let config;
      try {
        config = await homebridge.getPluginConfig();
      } catch (e) {
        document.getElementById('instances-panel').innerHTML =
          `<div class="error-banner">⚠️ Could not read plugin config: ${esc(String(e))}</div>`;
        return;
      }

      const thermostats = Array.isArray(config?.[0]?.thermostats)
        ? config[0].thermostats : [];

      const panel = document.getElementById('instances-panel');

      if (!thermostats.length) {
        panel.innerHTML = `
          <div class="section-title">Infinitude Instances</div>
          <div class="empty-state">
            No thermostats configured yet.<br>
            Add one using the form above, save, then reopen settings.
          </div>`;
        return;
      }

      const cards = thermostats.map((t, i) => {
        const name = esc(t.name || `Thermostat ${i + 1}`);
        const url  = (t.url || '').replace(/\/$/, '');
        if (!url) return `
          <div class="instance-card">
            <div class="card-header"><div class="card-title">${name}</div></div>
            <div class="card-actions" style="font-size:12px;color:#999">No URL configured</div>
          </div>`;

        return `
          <div class="instance-card" id="card-${i}">
            <div class="card-header">
              <div>
                <div class="card-title">${name}</div>
                <div class="card-url">${esc(url)}</div>
              </div>
              <span class="status-badge checking" id="badge-${i}">
                <span class="dot"></span> Checking…
              </span>
            </div>
            <div class="card-actions">
              <a class="btn btn-primary" href="${esc(url)}" target="_blank" rel="noopener">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                  <polyline points="15 3 21 3 21 9"/>
                  <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                Open Infinitude
              </a>
              <button class="btn btn-secondary" id="check-btn-${i}"
                      onclick="checkStatus(${i}, '${escAttr(url)}')">
                Check Status
              </button>
              <button class="btn btn-ghost" id="toggle-btn-${i}"
                      onclick="togglePreview(${i}, '${escAttr(url)}')">
                Preview ▾
              </button>
            </div>
            <div class="iframe-wrap" id="iframe-wrap-${i}">
              <div class="iframe-notice">
                ⚠️ Some browsers block iframes for http:// pages. Use "Open Infinitude" if blank.
              </div>
              <iframe id="frame-${i}" src="" title="Infinitude — ${esc(t.name || '')}"></iframe>
            </div>
          </div>`;
      }).join('');

      panel.innerHTML = `
        <div class="section-title">Infinitude Instances</div>
        <div class="instance-list">${cards}</div>`;

      // Auto-ping all instances
      thermostats.forEach((t, i) => {
        const url = (t.url || '').replace(/\/$/, '');
        if (url) checkStatus(i, url);
      });
    }

    // ── Status check ─────────────────────────────────────────────────
    async function checkStatus(index, url) {
      const badge = document.getElementById(`badge-${index}`);
      const btn   = document.getElementById(`check-btn-${index}`);
      if (!badge) return;

      badge.className = 'status-badge checking';
      badge.innerHTML = '<span class="dot"></span> Checking…';
      if (btn) btn.disabled = true;

      try {
        await homebridge.request('/status', { url });
        badge.className = 'status-badge online';
        badge.innerHTML = '<span class="dot"></span> Online';
      } catch (_) {
        badge.className = 'status-badge offline';
        badge.innerHTML = '<span class="dot"></span> Unreachable';
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    // ── Preview toggle ───────────────────────────────────────────────
    function togglePreview(index, url) {
      const wrap  = document.getElementById(`iframe-wrap-${index}`);
      const frame = document.getElementById(`frame-${index}`);
      const btn   = document.getElementById(`toggle-btn-${index}`);
      if (!wrap || !frame) return;

      const isOpen = wrap.classList.toggle('open');
      if (btn) btn.textContent = isOpen ? 'Preview ▴' : 'Preview ▾';

      if (isOpen && !frame.getAttribute('data-loaded')) {
        frame.src = url;
        frame.setAttribute('data-loaded', '1');
      } else if (!isOpen) {
        frame.src = '';
        frame.removeAttribute('data-loaded');
      }
    }

    // ── Boot ─────────────────────────────────────────────────────────
    if (typeof homebridge !== 'undefined') {
      init();
    } else {
      window.addEventListener('load', () => setTimeout(init, 250));
    }
  </script>
</body>
</html>
